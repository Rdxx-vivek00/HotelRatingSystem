kind: Application

server:
  port: 8081



spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/microservices?currentSchema=user_service
    username: vivekkumar
    password: 1234
    driver-class-name: org.postgresql.Driver
  config:
    import: optional:configserver:http://localhost:8085
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

